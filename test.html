<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#07070f;
    font-family:'JetBrains Mono',monospace;
    display:flex; flex-direction:column; align-items:center;

  h1 { color:#7788ff; font-size:12px; letter-spacing:4px; text-transform:uppercase; margin-bottom:4px; }
  .sub { font-size:10px; color:#333355; letter-spacing:2px; margin-bottom:16px; }

  .canvas-wrap {
    border:1px solid #151530;
    background:#05050e;

    position:relative;

  canvas { display:block; }

  .panel {
    width:200px;
    display:flex; flex-direction:column; gap:10px;
  }

  .legend {
    border:1px solid #151530;
    padding:12px;
    font-size:9px;
    line-height:1.8;
    color:#444466;
  }
  .legend b { color:#7788ff; display:block; margin-bottom:4px; font-size:10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }

  .info-box {
    border:1px solid #151530;
    padding:12px;
    font-size:9px;
    line-height:2;
    color:#444466;
  }
  .info-box b { color:#7788ff; display:block; margin-bottom:4px; }

  .controls { display:flex; flex-direction:column; gap:6px; }
  button {
    background:none; border:1px solid #222266;
    color:#6677ff; font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:2px; padding:7px 10px;
    cursor:pointer; text-transform:uppercase; text-align:left;
    transition:all 0.15s;
  }
  button:hover { background:#11116622; border-color:#7788ff; color:#aabbff; }
  button.active { background:#22226622; border-color:#aabbff; color:#ffffff; }

  .colorbar {
    height:8px; width:100%; margin-top:4px;
    background:linear-gradient(to right, #0033ff, #00aaff, #00ffaa, #ffaa00, #ff2200);
    border:1px solid #151530;
  }
  .colorbar-labels { display:flex; justify-content:space-between; font-size:8px; color:#333355; margin-top:2px; }

  #frameInfo {
    font-size:9px; color:#333355; padding:8px; border:1px solid #151530;
    min-height:60px;
  }
  #frameInfo b { color:#7788ff; }
  #frameInfo .hi { color:#aaaaff; }
</style>

</div>

// ── Parse ──────────────────────────────────────────────
function s16(lo, hi) {
  let v = lo | (hi << 8);
  return v >= 0x8000 ? v - 0x10000 : v;
}
const reports = rawData.trim().split('\n').map((line,i) => {
  const b = [];
  for (let j=0;j<line.length;j+=2) b.push(parseInt(line.slice(j,j+2),16));
  return { frame:i, btn:b[1], dx:s16(b[2],b[3]), dy:s16(b[4],b[5]), scroll:b[6] };
});

// Accumulate positions
const pts = [];
let cx=0, cy=0;
pts.push({x:0,y:0,frame:0,btn:0,dx:0,dy:0,speed:0});
for (const r of reports) {
  cx += r.dx; cy += r.dy;
  const speed = Math.sqrt(r.dx*r.dx + r.dy*r.dy);
  pts.push({x:cx, y:cy, frame:r.frame+1, btn:r.btn, dx:r.dx, dy:r.dy, speed, scroll:r.scroll});
}

const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
const minX=Math.min(...xs), maxX=Math.max(...xs);
const minY=Math.min(...ys), maxY=Math.max(...ys);
const maxSpeed = Math.max(...pts.map(p=>p.speed));
const totalDist = pts.reduce((s,p)=>s+p.speed,0);
const avgSpeed = totalDist/pts.length;

document.getElementById('statContent').innerHTML =
  `Frames: <span class="val">${pts.length}</span><br>` +
  `Max Δ: <span class="val">${maxSpeed.toFixed(1)} px/frame</span><br>` +
  `Avg Δ: <span class="val">${avgSpeed.toFixed(1)} px/frame</span><br>` +
  `Range X: <span class="val">${minX}→${maxX}</span><br>` +
  `Range Y: <span class="val">${minY}→${maxY}</span><br>` +
  `Total path: <span class="val">${totalDist.toFixed(0)} px</span>`;

// ── Canvas setup ────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=canvas.width, H=canvas.height;
const PAD=50;

function toC(x,y) {
  const rangeX = maxX-minX || 1, rangeY = maxY-minY || 1;
  const scale = Math.min((W-PAD*2)/rangeX, (H-PAD*2)/rangeY);
  const offX = (W - scale*rangeX)/2;
  const offY = (H - scale*rangeY)/2;
  return [offX + (x-minX)*scale, offY + (y-minY)*scale];
}

// ── Color functions ─────────────────────────────────────
function speedColor(speed, alpha=1) {
  const t = Math.min(speed/maxSpeed, 1);
  // blue → cyan → green → yellow → red
  let r,g,b;
  if (t < 0.25) { const u=t/0.25; r=0; g=Math.round(u*170); b=255; }
  else if (t < 0.5) { const u=(t-0.25)/0.25; r=0; g=Math.round(170+u*85); b=Math.round(255-u*255); }
  else if (t < 0.75) { const u=(t-0.5)/0.25; r=Math.round(u*255); g=255; b=0; }
  else { const u=(t-0.75)/0.25; r=255; g=Math.round(255-u*220); b=0; }
  return `rgba(${r},${g},${b},${alpha})`;
}

function timeColor(i, alpha=1) {
  const t = i/pts.length;
  const r=Math.round(30+t*120), b=Math.round(255-t*120);
  return `rgba(${r},60,${b},${alpha})`;
}

function dirColor(dx,dy,alpha=1) {
  const angle = Math.atan2(dy,dx); // -π to π
  const hue = ((angle/(Math.PI*2))*360+360)%360;
  return `hsla(${hue},90%,60%,${alpha})`;
}

// ── State ───────────────────────────────────────────────
let mode = 'speed';
let showArrows = true;
let showGrid = true;
let animId = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(animId){cancelAnimationFrame(animId);animId=null;}
  render();
}
function toggleArrows() { showArrows=!showArrows; render(); }
function toggleGrid()   { showGrid=!showGrid; render(); }

// ── Draw ────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle='#05050e';
  ctx.fillRect(0,0,W,H);

  if(!showGrid) return;
  ctx.strokeStyle='#0d0d22';
  ctx.lineWidth=1;
  for(let i=0;i<=10;i++){
    const x=PAD+(W-PAD*2)*i/10;
    const y=PAD+(H-PAD*2)*i/10;
    ctx.beginPath(); ctx.moveTo(x,PAD); ctx.lineTo(x,H-PAD); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD,y); ctx.lineTo(W-PAD,y); ctx.stroke();
  }
  // axes labels
  ctx.fillStyle='#222244'; ctx.font='8px JetBrains Mono';
  for(let i=0;i<=5;i++){
    const vx = minX + (maxX-minX)*i/5;
    const vy = minY + (maxY-minY)*i/5;
    const [cx_] = toC(vx, minY);
    const [,cy_] = toC(minX, vy);
    ctx.fillText(Math.round(vx), cx_-8, H-PAD+14);
    ctx.fillText(Math.round(vy), 2, cy_+3);
  }
}

function getColor(i) {
  const p = pts[i];
  if(mode==='speed')     return speedColor(p.speed);
  if(mode==='time')      return timeColor(i);
  if(mode==='direction') return dirColor(p.dx, p.dy);
  return '#ffffff';
}
function getWidth(i) {
  if(mode==='speed') return 1 + (pts[i].speed/maxSpeed)*3;
  return 1.5;
}

function render(upTo=pts.length) {
  drawBackground();

  // Draw trail
  for(let i=1; i<upTo; i++){
    const [x1,y1]=toC(pts[i-1].x,pts[i-1].y);
    const [x2,y2]=toC(pts[i].x,pts[i].y);

    // glow pass
    ctx.strokeStyle = getColor(i).replace(/[\d.]+\)$/,'0.15)');
    ctx.lineWidth = getWidth(i)+4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    // main line
    ctx.strokeStyle = getColor(i);
    ctx.lineWidth = getWidth(i);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // Direction arrows every ~8 frames
  if(showArrows) {
    const step = Math.max(1, Math.floor(upTo/20));
    for(let i=step; i<upTo; i+=step) {
      const p=pts[i], pp=pts[i-1];
      const [x,y]=toC(p.x,p.y);
      const angle=Math.atan2(p.y-pp.y, p.x-pp.x);
      const len=7;
      ctx.save();
      ctx.translate(x,y); ctx.rotate(angle);
      ctx.fillStyle = mode==='speed' ? speedColor(p.speed,0.7) : 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.moveTo(len,0); ctx.lineTo(-len/2,-len/2); ctx.lineTo(-len/2,len/2);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // Start marker
  const [sx,sy]=toC(pts[0].x,pts[0].y);
  ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2);
  ctx.fillStyle='#00ff88'; ctx.fill();
  ctx.fillStyle='#000'; ctx.font='bold 8px JetBrains Mono';
  ctx.fillText('S',sx-3,sy+3);

  // End marker (only if full render)
  if(upTo===pts.length){
    const [ex,ey]=toC(pts[upTo-1].x,pts[upTo-1].y);
    ctx.beginPath(); ctx.arc(ex,ey,7,0,Math.PI*2);
    ctx.fillStyle='#ff4488'; ctx.fill();
    ctx.fillStyle='#000'; ctx.font='bold 8px JetBrains Mono';
    ctx.fillText('E',ex-3,ey+3);
  } else if(upTo>0) {
    const [ex,ey]=toC(pts[upTo-1].x,pts[upTo-1].y);
    ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2);
    ctx.fillStyle='#ffffff88'; ctx.fill();
  }
}

render();

// ── Animate ─────────────────────────────────────────────
function animateIt() {
  if(animId){cancelAnimationFrame(animId);animId=null;}
  let i=1;
  function step(){
    render(i);
    if(i<pts.length){ i++; animId=requestAnimationFrame(step); }
  }
  step();
}

// ── Hover ────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  // Find nearest point
  let best=null, bestDist=Infinity;
  for(const p of pts){
    const [cx_,cy_]=toC(p.x,p.y);
    const d=(cx_-mx)**2+(cy_-my)**2;
    if(d<bestDist){bestDist=d;best=p;}
  }
  if(best && bestDist<400){
    const btnStr = best.btn===0?'none':
      (best.btn&1?'LEFT ':'')+(best.btn&2?'RIGHT ':'')+(best.btn&4?'MIDDLE':'');
    document.getElementById('frameInfo').innerHTML =
      `<b>Frame #${best.frame}</b><br>` +
      `Pos: <span class="hi">(${best.x}, ${best.y})</span><br>` +
      `Delta: <span class="hi">(${best.dx>0?'+':''}${best.dx}, ${best.dy>0?'+':''}${best.dy})</span><br>` +
      `Speed: <span class="hi">${best.speed.toFixed(2)} px/frame</span><br>` +
      `Button: <span class="hi">${btnStr||'none'}</span><br>` +
      `Scroll: <span class="hi">${best.scroll||0}</span>`;
  }
});
</script>
